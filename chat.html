<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexAgent AI Chat</title>
    <meta name="description" content="Chat with NexAgent AI">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-black: #000000;
            --bg-dark: #0a0a14;
            --accent-blue: #0066FF;
            --text-white: #ffffff;
            --text-gray: #8b8b9d;
        }

        html, body {
            height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Circle Reveal Animation on Load */
        #page-reveal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent-blue);
            z-index: 99999;
            pointer-events: none;
            border-radius: 50%;
            transform: scale(2);
            animation: revealPage 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes revealPage {
            to {
                transform: scale(0);
                opacity: 0;
            }
        }

        /* Container */
        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            background: linear-gradient(180deg, var(--bg-black) 0%, var(--bg-dark) 100%);
        }

        /* Header */
        #chat-header {
            height: 60px;
            background: linear-gradient(135deg, #0066FF, #0052cc);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.2rem;
            box-shadow: 0 4px 16px rgba(0, 102, 255, 0.3);
            flex-shrink: 0;
            padding-top: env(safe-area-inset-top);
        }

        #back-button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            cursor: pointer;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
        }

        #back-button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #header-title {
            font-size: 1.2rem;
            font-weight: 700;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        #status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        #status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Chat Messages Area */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Message Bubbles */
        .chat-message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: messageSlideIn 0.3s ease-out;
            font-size: 0.95rem;
        }

        .chat-message.user {
            align-self: flex-end;
            background: var(--accent-blue);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-bottom-left-radius: 4px;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Welcome Message */
        .welcome-message {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.15), rgba(0, 102, 255, 0.05));
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            max-width: 90%;
        }

        .welcome-message h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .welcome-message p {
            color: var(--text-gray);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Quick Replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .quick-reply-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .quick-reply-btn:hover {
            background: rgba(0, 102, 255, 0.3);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        /* Typing Indicator */
        #typing-indicator {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            padding: 14px 18px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* Input Area */
        #chat-input-container {
            padding: 1rem 1.2rem;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom));
            background: rgba(20, 20, 30, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 0.8rem;
            flex-shrink: 0;
        }

        #chat-input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s ease;
        }

        #chat-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.15);
        }

        #chat-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #chat-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #chat-send {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--accent-blue);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.4);
        }

        #chat-send:hover:not(:disabled) {
            background: #0052cc;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 102, 255, 0.5);
        }

        #chat-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .chat-message {
                max-width: 85%;
            }

            #header-title {
                position: static;
                transform: none;
            }

            #chat-header {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <!-- Page Reveal Animation -->
    <div id="page-reveal"></div>

    <!-- Chat Container -->
    <div id="chat-container">
        <!-- Header -->
        <header id="chat-header">
            <button id="back-button">
                ← Back
            </button>
            <h1 id="header-title">NexAgent AI</h1>
            <div id="status-indicator">
                <span id="status-dot"></span>
            </div>
        </header>

        <!-- Messages Area -->
        <div id="chat-messages"></div>

        <!-- Input Area -->
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
            <button id="chat-send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const CHAT_API = 'https://nexagent-chat.nani-0a3.workers.dev/chat';
        const MAX_HISTORY = 20;

        let conversationHistory = [];
        let isProcessing = false;

        // Parse Markdown to HTML
        function parseMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: #66b3ff; text-decoration: underline;">$1</a>')
                .replace(/\n- (.*?)(?=\n|$)/g, '\n• $1')
                .replace(/\n/g, '<br>');
        }

        // Add Message to Chat
        function addMessage(content, sender, withQuickReplies = false) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender}`;
            
            if (sender === 'ai') {
                messageDiv.innerHTML = parseMarkdown(content);
            } else {
                messageDiv.textContent = content;
            }

            messagesContainer.appendChild(messageDiv);

            // Add Quick Replies if first message
            if (withQuickReplies) {
                const quickReplies = document.createElement('div');
                quickReplies.className = 'quick-replies';
                quickReplies.innerHTML = `
                    <button class="quick-reply-btn" data-reply="Tell me about your pricing">💰 Pricing</button>
                    <button class="quick-reply-btn" data-reply="How does NexAgent work?">🤖 How it works</button>
                    <button class="quick-reply-btn" data-reply="Start a free trial">🚀 Free Trial</button>
                `;
                messagesContainer.appendChild(quickReplies);

                // Attach click handlers
                quickReplies.querySelectorAll('.quick-reply-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const reply = btn.dataset.reply;
                        quickReplies.remove();
                        sendMessage(reply);
                    });
                });
            }

            scrollToBottom();

            // Update conversation history
            if (sender === 'user' || sender === 'ai') {
                conversationHistory.push({
                    role: sender === 'user' ? 'user' : 'assistant',
                    content: content
                });

                if (conversationHistory.length > MAX_HISTORY) {
                    conversationHistory = conversationHistory.slice(-MAX_HISTORY);
                }
            }
        }

        // Show/Hide Typing Indicator
        function showTypingIndicator() {
            const messagesContainer = document.getElementById('chat-messages');
            const indicator = document.createElement('div');
            indicator.id = 'typing-indicator';
            indicator.innerHTML = `
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            `;
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // Scroll to Bottom
        function scrollToBottom() {
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Send Message
        async function sendMessage(customMessage = null) {
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('chat-send');
            const message = customMessage || input.value.trim();

            if (!message || isProcessing) return;

            addMessage(message, 'user');
            if (!customMessage) input.value = '';

            isProcessing = true;
            input.disabled = true;
            sendBtn.disabled = true;
            showTypingIndicator();

            try {
                const response = await fetch(CHAT_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                addMessage(data.response, 'ai');

            } catch (error) {
                hideTypingIndicator();
                console.error('Chat error:', error);
                addMessage("Sorry, I couldn't connect right now. Please try again in a moment.", 'ai');
            } finally {
                isProcessing = false;
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // Back Button - Smooth Reverse Animation
        document.getElementById('back-button').addEventListener('click', () => {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                z-index: 99999;
                background: #0066FF;
                border-radius: 0;
                width: 100vw;
                height: 100vh;
                top: 0;
                left: 0;
                transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                pointer-events: none;
            `;
            document.body.appendChild(overlay);
            
            requestAnimationFrame(() => {
                overlay.style.width = '56px';
                overlay.style.height = '56px';
                overlay.style.top = 'calc(100vh - 80px)';
                overlay.style.left = 'calc(100vw - 80px)';
                overlay.style.borderRadius = '50%';
            });
            
            setTimeout(() => window.location.href = 'nexagent.html', 500);
        });

        // Send Button Click
        document.getElementById('chat-send').addEventListener('click', () => sendMessage());

        // Enter Key to Send
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize Chat with Welcome Message
        window.addEventListener('DOMContentLoaded', () => {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'welcome-message';
            welcomeDiv.innerHTML = `
                <h3>Hi! 👋 I'm NexAgent AI</h3>
                <p>Ask me anything about our plans, features, or how we can help your business grow.</p>
            `;
            
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.appendChild(welcomeDiv);

            // Quick Replies
            const quickReplies = document.createElement('div');
            quickReplies.className = 'quick-replies';
            quickReplies.innerHTML = `
                <button class="quick-reply-btn" data-reply="Tell me about your pricing">💰 Pricing</button>
                <button class="quick-reply-btn" data-reply="How does NexAgent work?">🤖 How it works</button>
                <button class="quick-reply-btn" data-reply="Start a free trial">🚀 Free Trial</button>
            `;
            messagesContainer.appendChild(quickReplies);

            // Attach click handlers
            quickReplies.querySelectorAll('.quick-reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const reply = btn.dataset.reply;
                    quickReplies.remove();
                    sendMessage(reply);
                });
            });

            // Focus input
            document.getElementById('chat-input').focus();
        });
    </script>
</body>
</html>
