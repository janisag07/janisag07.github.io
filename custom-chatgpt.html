<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom ChatGPT – Deutschsprachiger KI-Assistent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000 0%, #0a0a14 100%);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }
        .subtitle {
            color: #999;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
        }
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #667eea;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .setting-group label {
            display: block;
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        select, input[type="range"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 0.75rem;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        select {
            cursor: pointer;
        }
        input[type="range"] {
            padding: 0;
            cursor: pointer;
        }
        .chat-main {
            display: flex;
            flex-direction: column;
            height: 70vh;
        }
        .chat-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .message {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-items: flex-end;
        }
        .message.ai {
            align-items: flex-start;
        }
        .message-bubble {
            max-width: 75%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .message.ai .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-container {
            display: flex;
            gap: 1rem;
        }
        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 1rem 2rem;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }
        .toggle input[type="checkbox"] {
            width: 50px;
            height: 26px;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .toggle input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .toggle input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            top: 3px;
            left: 3px;
            transition: all 0.3s ease;
        }
        .toggle input[type="checkbox"]:checked::before {
            left: 27px;
        }
        .value-display {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            color: #667eea;
            margin-top: 0.5rem;
        }
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Custom ChatGPT</h1>
        <p class="subtitle">Intelligenter deutschsprachiger Assistent mit anpassbarer Tonalität</p>

        <div class="dashboard">
            <div class="card">
                <h2>⚙️ Einstellungen</h2>
                <div class="settings-panel">
                    <div class="setting-group">
                        <label>Tonalität</label>
                        <select id="toneSelect" onchange="updateSettings()">
                            <option value="professional">Professionell</option>
                            <option value="friendly">Freundlich</option>
                            <option value="formal">Formell</option>
                            <option value="casual">Locker</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>Antwortlänge</label>
                        <input type="range" id="lengthSlider" min="1" max="3" value="2" onchange="updateSettings()">
                        <div class="value-display" id="lengthValue">Mittel</div>
                    </div>

                    <div class="setting-group">
                        <label>Kontext-Verständnis</label>
                        <label class="toggle">
                            <input type="checkbox" id="contextToggle" checked onchange="updateSettings()">
                            <span>Aktiviert</span>
                        </label>
                    </div>

                    <div class="setting-group">
                        <label>FAQ-Integration</label>
                        <label class="toggle">
                            <input type="checkbox" id="faqToggle" checked onchange="updateSettings()">
                            <span>Aktiviert</span>
                        </label>
                    </div>

                    <div class="setting-group">
                        <label>Auto-Eskalation</label>
                        <label class="toggle">
                            <input type="checkbox" id="escalationToggle" onchange="updateSettings()">
                            <span>Bei Bedarf</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="card chat-main">
                <h2>💬 Chat-Interface</h2>
                <div class="chat-container" id="chatContainer">
                    <div class="message ai">
                        <div class="message-bubble">Guten Tag! Ich bin Ihr persönlicher KI-Assistent. Wie kann ich Ihnen heute helfen?</div>
                    </div>
                </div>
                <div class="input-container">
                    <input type="text" id="userInput" placeholder="Stellen Sie eine Frage...">
                    <button onclick="sendMessage()">Senden</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let settings = {
            tone: 'professional',
            length: 2,
            context: true,
            faq: true,
            escalation: false
        };

        function updateSettings() {
            settings.tone = document.getElementById('toneSelect').value;
            settings.length = parseInt(document.getElementById('lengthSlider').value);
            settings.context = document.getElementById('contextToggle').checked;
            settings.faq = document.getElementById('faqToggle').checked;
            settings.escalation = document.getElementById('escalationToggle').checked;

            const lengthLabels = ['Kurz', 'Mittel', 'Ausführlich'];
            document.getElementById('lengthValue').textContent = lengthLabels[settings.length - 1];
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatContainer = document.getElementById('chatContainer');
            const message = input.value.trim();
            
            if (!message) return;

            // User message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="message-bubble">${message}</div>`;
            chatContainer.appendChild(userMsg);
            
            input.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Build system prompt based on settings
            let systemPrompt = `Du bist ein deutschsprachiger KI-Assistent. `;
            
            switch(settings.tone) {
                case 'professional':
                    systemPrompt += 'Antworte professionell und kompetent. Sie den Nutzer. ';
                    break;
                case 'friendly':
                    systemPrompt += 'Antworte freundlich und hilfsbereit. Sie den Nutzer. ';
                    break;
                case 'formal':
                    systemPrompt += 'Antworte sehr formell und respektvoll. Sie den Nutzer. ';
                    break;
                case 'casual':
                    systemPrompt += 'Antworte locker und entspannt. Du kannst den Nutzer duzen. ';
                    break;
            }

            const lengthInstructions = ['Antworte sehr kurz (1-2 Sätze).', 'Antworte in moderater Länge.', 'Gib ausführliche Antworten.'];
            systemPrompt += lengthInstructions[settings.length - 1];

            if (settings.context) {
                systemPrompt += ' Behalte den Gesprächskontext im Auge.';
            }

            if (settings.faq) {
                systemPrompt += ' Du hast Zugriff auf eine FAQ-Datenbank.';
            }

            if (settings.escalation) {
                systemPrompt += ' Eskaliere komplexe Anfragen an einen menschlichen Mitarbeiter.';
            }

            // AI response
            try {
                const response = await fetch('https://nexagent-chat.nani-0a3.workers.dev/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: message }
                        ]
                    })
                });

                const data = await response.json();
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai';
                aiMsg.innerHTML = `<div class="message-bubble">${data.reply || 'Entschuldigung, ich hatte ein Problem. Können Sie das bitte wiederholen?'}</div>`;
                chatContainer.appendChild(aiMsg);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (error) {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'message ai';
                let demoResponse = '';
                
                if (settings.tone === 'casual') {
                    demoResponse = 'Hey! Also das klingt interessant. Ich würde sagen, da können wir auf jeden Fall was machen. Was genau schwebt dir denn vor?';
                } else {
                    demoResponse = 'Vielen Dank für Ihre Anfrage. Das ist eine interessante Fragestellung. Gerne gehe ich darauf ein und erläutere Ihnen die Details.';
                }
                
                errorMsg.innerHTML = `<div class="message-bubble">${demoResponse}</div>`;
                chatContainer.appendChild(errorMsg);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize
        updateSettings();
    </script>
</body>
</html>
