<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EWM AI Sales Assistant — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a14;
            --bg-darker: #050508;
            --bg-card: rgba(20, 20, 35, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --text-muted: #6b7280;
            --ewm-blue: #0066cc;
            --ewm-blue-light: #3388dd;
            --accent-green: #10b981;
            --border-color: rgba(255, 255, 255, 0.08);
            --glow-blue: rgba(0, 102, 204, 0.4);
        }

        html, body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 102, 204, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(74, 85, 104, 0.05) 0%, transparent 50%);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        /* Safe Area Support */
        .safe-area-top {
            padding-top: env(safe-area-inset-top);
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Header */
        .chat-header {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.2rem;
            padding-top: calc(1rem + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--ewm-blue-light);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .header-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            -webkit-overflow-scrolling: touch;
        }

        /* Welcome Message */
        .welcome-message {
            padding: 1.2rem;
            background: rgba(0, 102, 204, 0.08);
            border: 1px solid rgba(0, 102, 204, 0.2);
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }

        .welcome-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .welcome-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        /* Chat Messages */
        .chat-message {
            padding: 0.9rem 1.1rem;
            border-radius: 16px;
            max-width: 85%;
            word-wrap: break-word;
            animation: messageSlide 0.3s ease;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--ewm-blue), var(--ewm-blue-light));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.ai {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .chat-message.typing {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1.2rem;
        }

        .typing-indicator {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Quick Replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            padding: 0 1rem;
            margin-bottom: 0.5rem;
        }

        .quick-reply {
            padding: 0.7rem 1.2rem;
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--ewm-blue-light);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .quick-reply:active {
            transform: scale(0.95);
            background: rgba(0, 102, 204, 0.2);
        }

        /* Input Area */
        .input-container {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 1rem 1.2rem;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom));
            display: flex;
            gap: 0.8rem;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            resize: none;
            max-height: 120px;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--ewm-blue);
            background: rgba(255, 255, 255, 0.08);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--ewm-blue), var(--ewm-blue-light));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.9);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 102, 204, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 102, 204, 0.5);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="chat-header">
        <button class="back-btn" onclick="goBack()" aria-label="Zurück">
            ←
        </button>
        <div class="header-info">
            <div class="header-title">EWM AI Sales Assistant</div>
            <div class="header-status">
                <div class="online-dot"></div>
                <span>Online</span>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
        <div class="welcome-message">
            <div class="welcome-icon">👋</div>
            <div class="welcome-text">
                Hallo! Ich bin der EWM AI Sales Assistant. Fragen Sie mich zu Schweißgeräten, Preisen oder Verfügbarkeit.
            </div>
        </div>
    </div>

    <!-- Quick Replies -->
    <div class="quick-replies" id="quickReplies">
        <div class="quick-reply" onclick="sendQuickReply('Preisanfrage Titan XQ')">Preisanfrage Titan XQ</div>
        <div class="quick-reply" onclick="sendQuickReply('Verfügbarkeit prüfen')">Verfügbarkeit prüfen</div>
        <div class="quick-reply" onclick="sendQuickReply('Technische Specs')">Technische Specs</div>
    </div>

    <!-- Input -->
    <div class="input-container">
        <textarea 
            class="chat-input" 
            id="chatInput" 
            placeholder="Nachricht eingeben..."
            rows="1"
            onkeydown="handleEnter(event)"
            oninput="autoResize()"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Senden">
            ➤
        </button>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickRepliesContainer = document.getElementById('quickReplies');

        // Go back with circle reveal
        function goBack() {
            window.location.href = 'denis-schnorer.html';
        }

        // Auto-resize textarea
        function autoResize() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        }

        // Add message to chat
        function addMessage(message, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user' : 'ai'}`;
            messageDiv.textContent = message;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show typing indicator
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'chat-message typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        // Scroll to bottom
        function scrollToBottom() {
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // Hide quick replies after first message
            if (quickRepliesContainer.children.length > 0) {
                quickRepliesContainer.style.display = 'none';
            }

            // Add user message
            addMessage(message, true);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Show typing
            showTyping();

            try {
                const response = await fetch('https://nexagent-chat.nani-0a3.workers.dev/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [
                            {
                                role: "system",
                                content: "Du bist ein AI Sales Assistant für EWM GmbH, Weltmarktführer in Schweißtechnik. Du hilfst bei Kundenanfragen zu Schweißgeräten (Titan XQ, Phoenix, Taurus), Preisanfragen, Verfügbarkeit und technischen Spezifikationen. Antworte auf Deutsch, professionell aber freundlich."
                            },
                            {
                                role: "user",
                                content: message
                            }
                        ]
                    })
                });

                const data = await response.json();
                hideTyping();

                if (data.response) {
                    addMessage(data.response);
                } else {
                    addMessage("Entschuldigung, ich konnte keine Antwort generieren. Bitte versuchen Sie es erneut.");
                }
            } catch (error) {
                hideTyping();
                console.error('Chat error:', error);
                addMessage("Entschuldigung, es gab einen Verbindungsfehler. Bitte versuchen Sie es später erneut.");
            }

            sendBtn.disabled = false;
            chatInput.focus();
        }

        // Quick reply
        function sendQuickReply(message) {
            chatInput.value = message;
            sendMessage();
        }

        // Handle Enter key
        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Focus input on load
        window.addEventListener('load', () => {
            chatInput.focus();
        });

        // Prevent zoom on input focus (iOS)
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                document.querySelector('meta[name=viewport]').setAttribute(
                    'content',
                    'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'
                );
            });
            el.addEventListener('blur', () => {
                document.querySelector('meta[name=viewport]').setAttribute(
                    'content',
                    'width=device-width, initial-scale=1.0, viewport-fit=cover'
                );
            });
        });
    </script>
</body>
</html>
